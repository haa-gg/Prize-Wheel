<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convention Prize Wheel</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Local Fonts -->
    <link rel="stylesheet" href="font.css">
</head>

<body>
    <div class="app-container">
        <button id="btn-edit-config" class="icon-btn floating-config-btn" title="Edit Prizes">⚙️</button>

        <main>
            <div class="wheel-container">
                <div class="pointer"></div>
                <canvas id="wheel-canvas" width="700" height="700"></canvas>
                <button id="btn-spin" class="spin-btn">Push<br>the<br>Button</button>
            </div>
        </main>
    </div>

    <!-- Winner Modal -->
    <div id="winner-modal" class="modal hidden">
        <div class="modal-content glass">
            <h2>🎉 You Won! 🎉</h2>
            <h1 id="winner-prize-text">A Sticker</h1>
            <button id="btn-reset" class="primary-btn">Awesome!</button>
        </div>
    </div>

    <!-- Config Editor Modal -->
    <div id="config-modal" class="modal hidden">
        <div class="modal-content glass config-content">
            <h2>Prize Configuration</h2>
            <p>Set prize names, relative weights, and colors. Higher weight = larger wedge.</p>

            <div id="prize-list">
                <!-- Dynamically populated prize rows go here -->
            </div>

            <button id="btn-add-prize" class="secondary-btn">+ Add Prize</button>

            <div class="modal-actions">
                <button id="btn-config-cancel" class="text-btn">Cancel</button>
                <button id="btn-config-save" class="primary-btn">Save & Apply</button>
            </div>
            <div class="credits">
                <a href="https://github.com/haa-gg" target="_blank" rel="noopener noreferrer">By: Glendon Gengel</a>
            </div>
        </div>
    </div>

    <!-- Local Confetti Library -->
    <script src="confetti.js"></script>
    <script src="script.js"></script>
</body>

</html>
