<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convention Prize Wheel</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Local Fonts -->
    <link rel="stylesheet" href="font.css">
</head>

<body>
    <div class="app-container">
        <button id="btn-edit-config" class="icon-btn floating-config-btn" title="Edit Prizes">⚙️</button>

        <h1 class="portrait-only portrait-title">Spin the wheel win a prize every time</h1>

        <main>
            <div class="wheel-container">
                <div class="pointer"></div>
                <canvas id="wheel-canvas" width="700" height="700"></canvas>
                <button id="btn-spin" class="spin-btn">Press<br>the<br>Button</button>
            </div>
        </main>

        <div class="portrait-only portrait-footer-container">
            <h3 class="portrait-footer">Courtesy of Hartlepool United Futball club</h3>
            <img class="portrait-logo" src="https://www.hartlepoolunited.co.uk/wp-content/uploads/2024/04/logo_transparent.png" alt="Hartlepool United Logo">
        </div>
    </div>

    <!-- Winner Modal -->
    <div id="winner-modal" class="modal hidden">
        <div class="modal-content glass">
            <h2>🎉 You Won! 🎉</h2>
            <h1 id="winner-prize-text">A Sticker</h1>
            <button id="btn-reset" class="primary-btn">Awesome!</button>
        </div>
    </div>

    <!-- Config Editor Modal -->
    <div id="config-modal" class="modal hidden">
        <div class="modal-content glass config-content">
            <h2>Prize Configuration</h2>
            <p>Set prize names, relative weights, and colors. Higher weight = larger wedge.</p>

            <div class="global-settings" style="display: flex; flex-wrap: wrap; gap: 10px; align-items: center;">
                <div>
                    <label for="global-font-size">Wheel Size (px):</label>
                    <input type="number" id="global-font-size" class="config-input" min="10" max="60" value="20" style="width: 70px;">
                </div>
                <div>
                    <label for="button-font-size">Button Size (px):</label>
                    <input type="number" id="button-font-size" class="config-input" min="10" max="100" value="22" style="width: 70px;">
                </div>
                <div>
                    <label for="header-font-size">Header Size (px):</label>
                    <input type="number" id="header-font-size" class="config-input" min="10" max="100" value="48" style="width: 70px;">
                </div>
                <div>
                    <label for="footer-font-size">Footer Size (px):</label>
                    <input type="number" id="footer-font-size" class="config-input" min="10" max="100" value="24" style="width: 70px;">
                </div>
            </div>

            <div id="prize-list">
                <!-- Dynamically populated prize rows go here -->
            </div>

            <button id="btn-add-prize" class="secondary-btn">+ Add Prize</button>

            <div class="modal-actions">
                <button id="btn-config-cancel" class="text-btn">Cancel</button>
                <button id="btn-config-save" class="primary-btn">Save & Apply</button>
            </div>
            <div class="credits">
                <a href="https://github.com/haa-gg" target="_blank" rel="noopener noreferrer">By: Glendon Gengel</a>
            </div>
        </div>
    </div>

    <!-- Local Confetti Library -->
    <script src="confetti.js"></script>
    <script src="script.js"></script>
</body>

</html>
